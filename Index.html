<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Anime Character Showcase</title>
  <style>
    body {
      background: #0d0d0d;
      font-family: 'Poppins', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      min-height: 100vh;
      gap: 2rem;
    }

    .card {
      width: 250px;
      height: 350px;
      perspective: 1000px;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.8s;
      transform-style: preserve-3d;
    }

    .card:hover .card-inner {
      transform: rotateY(180deg);
    }

    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 0 20px #00f0ff;
    }

    .card-front {
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card-front img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-back {
      background: #111;
      color: #fff;
      transform: rotateY(180deg);
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: center;
      box-shadow: 0 0 25px #ff00ff;
    }

    .card-back h2 {
      margin: 10px 0;
      color: #00f0ff;
      text-shadow: 0 0 10px #00f0ff;
    }

    .card-back p {
      font-size: 14px;
      line-height: 1.4;
      color: #ccc;
    }

    .card-back .powers {
      margin: 10px 0;
      font-weight: bold;
      color: #ff00ff;
      text-shadow: 0 0 8px #ff00ff;
    }
  </style>
</head>
<body>

  <!-- Character Card Example -->
  <div class="card">
    <div class="card-inner">
      <div class="card-front">
        <img src="https://upload.wikimedia.org/wikipedia/en/c/cb/Monkey_D_Luffy.png" alt="Character 1">
      </div>
      <div class="card-back">
        <h2>Akira</h2>
        <div class="powers">Power: Flame Manipulation</div>
        <p>A fearless warrior who controls fire with precision, protecting allies and striking fear into enemies.</p>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-inner">
      <div class="card-front">
        <img src="D:\25cp435\images.jpg" alt="Character 2">
      </div>
      <div class="card-back">
        <h2>Hikari</h2>
        <div class="powers">Power: Light Healing</div>
        <p>A gentle soul who channels radiant energy to heal wounds and inspire hope in dark times.</p>
      </div>
    </div>
  </div>

</body>
</html>
